name: Version guard

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
      IS_MAIN: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full tag history needed for ordering check

      - name: Read version from Cargo.toml
        id: ver
        run: |
          FULL=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          # Release identifier = first two components (YY.N), patch is internal only.
          RELEASE=$(echo "$FULL" | cut -d. -f1,2)
          echo "full=$FULL"     >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "full=$FULL  release=$RELEASE  tag=$IS_TAG  main=$IS_MAIN"

      - name: Validate YY.N(.P) format
        run: |
          FULL="${{ steps.ver.outputs.full }}"
          if ! echo "$FULL" | grep -qE '^[0-9]{2}\.[1-9][0-9]*(\.[0-9]+)?$'; then
            MSG="Cargo.toml version '$FULL' must be YY.N or YY.N.P (e.g. 26.1 or 26.1.0)."
            if [ "$IS_TAG" = "true" ] || [ "$IS_MAIN" = "true" ]; then
              echo "::error::$MSG"; exit 1
            else
              echo "::warning::$MSG"
            fi
          fi

      - name: Validate year matches current calendar year
        run: |
          YY=$(echo "${{ steps.ver.outputs.release }}" | cut -d. -f1)
          CURRENT_YY=$(date -u +%y)
          if [ "$YY" != "$CURRENT_YY" ]; then
            MSG="Version year '$YY' does not match current year '$CURRENT_YY'. Version must be $CURRENT_YY.N."
            if [ "$IS_TAG" = "true" ] || [ "$IS_MAIN" = "true" ]; then
              echo "::error::$MSG"; exit 1
            else
              echo "::warning::$MSG"
            fi
          fi

      - name: Check semver ordering against existing releases
        run: |
          RELEASE="${{ steps.ver.outputs.release }}"
          YY=$(echo "$RELEASE" | cut -d. -f1)
          N=$(echo "$RELEASE"  | cut -d. -f2)
          # Find the highest existing release tag for this year (format: vYY.N).
          LATEST=$(git tag -l "v${YY}.*" \
            | grep -E "^v[0-9]{2}\.[1-9][0-9]*$" \
            | sort -t. -k2 -n \
            | tail -1)
          if [ -n "$LATEST" ]; then
            LATEST_N=$(echo "$LATEST" | cut -d. -f2)
            if [ "$N" -le "$LATEST_N" ]; then
              MSG="Release version '$RELEASE' must be greater than latest release '${YY}.${LATEST_N}'. Use ${YY}.$((LATEST_N + 1)) or higher."
              if [ "$IS_TAG" = "true" ] || [ "$IS_MAIN" = "true" ]; then
                echo "::error::$MSG"; exit 1
              else
                echo "::warning::$MSG"
              fi
            fi
          fi

      # ‚îÄ‚îÄ Tag-only checks ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

      - name: Validate tag matches release version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="$GITHUB_REF_NAME"
          RELEASE="${{ steps.ver.outputs.release }}"
          if [ "$TAG" != "v$RELEASE" ]; then
            echo "::error::Tag '$TAG' does not match release version 'v$RELEASE' derived from Cargo.toml '${{ steps.ver.outputs.full }}'."
            exit 1
          fi

      - name: Check for duplicate release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE="${{ steps.ver.outputs.release }}"
          TAG="v$RELEASE"
          EXISTING=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" \
            --jq '.tag_name' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            N=$(echo "$RELEASE"  | cut -d. -f2)
            YY=$(echo "$RELEASE" | cut -d. -f1)
            echo "::error::Release '$TAG' already exists. Use $YY.$((N + 1)) for the next release."
            exit 1
          fi
