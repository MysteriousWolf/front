name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ── Fast gate ─────────────────────────────────────────────────────────────
  # fmt + check both feature sets; everything else waits on this.
  quick:
    name: Quick checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Check (all features)
        run: cargo check --all-targets --all-features

      - name: Check (no default features)
        run: cargo check --all-targets --no-default-features

  # ── Lint ──────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: quick
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

  # ── Build matrix ──────────────────────────────────────────────────────────
  # NOTE: lto = "fat" + codegen-units = 1 in [profile.release] means these
  # runs are slow (~5–10 min on a cold cache). Acceptable for release
  # validation; if CI wall time becomes a problem, add a [profile.ci] override.
  build:
    name: Build (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: quick
    strategy:
      matrix:
        include:
          - label: all-features
            flags: --all-features
          - label: no-default-features
            flags: --no-default-features
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.label }}

      - name: Build
        run: cargo build --release ${{ matrix.flags }}

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: quick
    strategy:
      matrix:
        include:
          - label: all-features
            flags: --all-features
          - label: no-default-features
            flags: --no-default-features
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.label }}

      - name: Test
        run: cargo test ${{ matrix.flags }}

  # ── Docs ──────────────────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: quick
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Doc check
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  # ── Security audit ────────────────────────────────────────────────────────
  # Runs independently — only reads Cargo.lock, no build needed.
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit binary
        id: audit-bin-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-0.22

      - name: Install cargo-audit
        if: steps.audit-bin-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Audit
        run: cargo audit
